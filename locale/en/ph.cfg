[technology-description]
s6x-electrolysis=The chloralkalai process uses electrolysis to produce hydrochloric acid and sodium hydroxide.
s6x-nitric-acid=Allows the production of nitric acid, and its precursor ammonia.
s6x-hydrodesulfurization=Use of sodium hydroxide to remove impurities from crude oil before refining.
s6x-hydrodesulfurization-adv=More advanced oil refining aided by sodium hydroxide.
s6x-alkaline-battery=An upgraded battery with greater energy density.
s6x-steel-acid-treatment=Using acid to remove iron impurities for more efficient steel production.
s6x-alkaline-accumulators=Alkaline batteries can also be used in accumulators.
s6x-alkaline-robotics=Alkaline batteries can also be used in flying robot frames.
s6x-asteroid-melting=Breaking down asteroids until nothing solid remains.
s6x-nitrate-nutrients=Nutrients can be synthesized directly from ammonia and nitric acid.
s6x-circuit-scrap-melting=Immersing circuit scrap in hydrochloric acid allows breaking it down into its components.
s6x-fulgora-scrap-melting=Strong acids can accelerate the decomposition of Fulgora's scrap to better access the holmium within.
s6x-gleba-pickling=Using a solution of dilute acetic acid, better known as vinegar, to preserve spoilable products.
s6x-egg-preservation=Making dangerous eggs safe for storage and transport.
s6x-glass-improved=Faster and better techniques for making glass.
s6x-processing-unit-hf=Hydrofluoric acid allows faster and more efficient circuit etching.

s6x-void-acid-base=Allows conjuring hydrochloric acid and sodium hydroxide using voidcraft.
s6x-void-ammonia-hno3=Allows conjuring ammonia and nitric acid using voidcraft.

